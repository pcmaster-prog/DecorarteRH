[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_20", "postgresql"]

[phases.build]
cmds = [
    "cd backend && composer install --no-dev --optimize-autoloader --no-interaction",
    "cd backend && php artisan config:cache",
    "cd backend && php artisan route:cache",
    "cd frontend && npm install",
    "cd frontend && npm run build",
    "mkdir -p backend/public && cp -r frontend/dist/* backend/public/"
]

[phases.setup.env]
APP_ENV = "production"
APP_DEBUG = "false"
